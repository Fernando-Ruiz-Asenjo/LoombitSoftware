name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt
      - name: Puerta de verificación (gate canónico · STRICT)
        # §GOB-2: el MISMO gate que el hook de pre-commit, en strict (con dientes):
        # black + ruff + pytest + auditorías deterministas + fuzz de invariantes + mutation testing.
        run: python scripts/verify.py --strict
