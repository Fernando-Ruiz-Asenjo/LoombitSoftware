name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt
      - name: Puerta de verificación (gate canónico · STRICT + LIVE)
        # §GOB-2: el MISMO gate que el hook de pre-commit, en strict + live (todo lo comprobable):
        # black + ruff + pytest + auditorías + fuzz + mutation testing + TEST EN VIVO (servidor real).
        # GitHub re-confirma este gate; un check verde aquí es el ÚNICO recibo de "hecho" (no la palabra del LLM).
        run: python scripts/verify.py --strict --live
