name: Auto-merge on green

# Cierra el bucle del Protocolo de Verificación Canónico (D-66): cuando el gate de GitHub (workflow "CI",
# que corre `verify.py --strict --live`) termina en VERDE para un PR, este workflow lo FUNDE solo. Así
# "hecho" = check verde, y el merge lo dispara GitHub — ni el agente ni un clic humano. El agente solo
# PROPONE (abre el PR como ready); GitHub VERIFICA y FUNDE.
#
# Seguridad: solo PRs del propio repo (no forks), solo si NO son borrador (draft = "aún no para fundir"),
# solo si el run que terminó es de un pull_request y concluyó success. Si hay conflictos o falta una
# aprobación requerida por la protección de rama, el merge no se fuerza (GitHub lo rechaza y queda a mano).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Fundir el PR cuyo CI pasó en verde
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (prs.length === 0) {
              core.info("El run no trae PRs asociados (¿fork?). Nada que fundir.");
              return;
            }
            for (const pr of prs) {
              const { data: full } = await github.rest.pulls.get({
                owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number,
              });
              if (full.state !== "open") { core.info(`PR #${pr.number} no está abierto, salto.`); continue; }
              if (full.draft) { core.info(`PR #${pr.number} es borrador, salto (no listo para fundir).`); continue; }
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner, repo: context.repo.repo,
                  pull_number: pr.number, merge_method: "merge",
                });
                core.info(`✅ PR #${pr.number} fundido automáticamente (CI verde).`);
              } catch (e) {
                core.warning(`No se pudo fundir el PR #${pr.number}: ${e.message}. Queda a mano (conflicto o aprobación requerida).`);
              }
            }
