name: Blindaje — branch protection as code (auto-curación)

# Versiona el ESTADO DESEADO de la protección de `main` y lo RE-APLICA periódicamente. Si alguien la
# debilita a mano (baja enforce_admins, quita el review del auditor, abre force-push…), el siguiente
# tick lo RESTAURA — el debilitamiento es efímero (patrón github/safe-settings; radar 2026-06-12).
# Complementa: el guardian `tests/test_gate_integridad.py` (en el check `quality`) + el hook local
# `~/.claude/hooks/blindaje_guard.py`. Caveat honesto: necesita un PAT con `admin:repo` en el secret
# BLINDAJE_PAT (el GITHUB_TOKEN por defecto NO puede editar branch protection). Lo crea Fernando.

on:
  push:
    branches: [main]
    paths: [".github/workflows/branch-protection.yml"]
  schedule:
    - cron: "17 */6 * * *" # cada 6 h
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - name: Re-aplicar el estado deseado de la protección de main
        env:
          GH_TOKEN: ${{ secrets.BLINDAJE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Falta el secret BLINDAJE_PAT (PAT con admin:repo). Sin él no se puede auto-curar."
            exit 1
          fi
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/branches/main/protection" --input - <<'JSON'
          {
            "required_status_checks": { "strict": true, "contexts": ["quality"] },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "require_code_owner_reviews": true,
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }
          JSON
          echo "Protección de main re-aplicada (auditor @construiaapp obligatorio, sin force-push)."
